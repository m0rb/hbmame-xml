name: Convert HBMAME sources to MAME hash XML

on:
  schedule:
    - cron: "0 0/12 * * *"
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hbmame-xml
        uses: actions/checkout@v4

      - name: Checkout HBMAME
        uses: actions/checkout@v4
        with:
          repository: Robbbert/hbmame
          ref: ${{ inputs.ref || 'master' }}
          path: hbmame

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run conversion
        run: |
          PYTHONPATH=src python -m hbmame_xml \
            --source hbmame \
            --system all \
            --output-dir . \
            --verbose

      - name: Run tests
        run: |
          PYTHONPATH=src python -m unittest discover -s tests

      - name: Commit generated XML back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add machine-xml/ romset-xml/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update machine-xml and romset-xml from HBMAME conversion"
            git push
          fi

      - name: Show summary
        run: |
          echo "## Conversion Results"
          echo "- **Machine XML files:** $(ls -1 machine-xml/*.xml 2>/dev/null | wc -l)"
          echo "- **Romset XML files:** $(find romset-xml/ -name '*.xml' 2>/dev/null | wc -l)"

      - name: Create archives
        run: |
          zip -r machine-xml.zip machine-xml
          zip -r romset-xml.zip romset-xml

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "HBMAME to MAME XML conversion"
          tag_name: "latest"
          body: "Conversion of all HBMAME machines to MAME XML format"
          files: |
            machine-xml.zip
            romset-xml.zip